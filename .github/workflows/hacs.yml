name: HACS

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hacs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate with HACS
        uses: hacs/action@main
        with:
          category: integration
          ignore: topics
