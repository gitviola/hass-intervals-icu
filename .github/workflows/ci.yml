name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  python-compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile integration
        run: python -m compileall custom_components/intervals_icu
